{{ define "main" }}
  <div class="post">
    <div class="post-content">
      <div class="container">
        {{ $team := where .Site.Pages "Type" "team" }}
        {{ if $team }}
          <section class="team-members">
            {{ range $team }}
              {{ if ne .File.BaseFileName "_index" }}
                <div class="team-member">
                  <p>
                    <strong>{{ .Params.role }}</strong><br>
                    {{ .Title }}
                    ({{ .Params.affiliation }}, summer {{ .Params.summer }})
                  </p>
                </div>
              {{ end }}
            {{ end }}
          </section>
        {{ end }}
      </div>
    </div>
  </div>
{{ end }}
